<script type="text/babel">const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ══ UTILITIES ══ */
function parseLocal(d) {
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    const [y,m,day] = d.split('-').map(Number);
    return new Date(y, m-1, day);
  }
  return new Date(d);
}
function getMonday(d) {
  const date = parseLocal(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff); date.setHours(0,0,0,0);
  return date;
}
function addDays(d, n) { const r = parseLocal(d); r.setDate(r.getDate()+n); return r; }
function getWeekKey(d) {
  const m = getMonday(d);
  return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}
function getLastSunday(from = new Date()) {
  const d = new Date(from); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function fmtShort(d) { return parseLocal(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
function fmtMonthYear(d) { return parseLocal(d).toLocaleDateString('de-DE',{month:'long',year:'numeric'}); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function weekNumber(wk) {
  const d = parseLocal(wk);
  const jan1 = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
}
function isMemberAway(member, weekKey) {
  const mon = parseLocal(weekKey), sun = addDays(mon,6);
  return (member.absences||[]).some(a => { const f=parseLocal(a.from),t=parseLocal(a.to); return f<=sun&&t>=mon; });
}

/* ══ DEFAULTS ══ */
const COLORS = ['#f59e0b','#ef4444','#3b82f6','#10b981','#8b5cf6','#f97316','#06b6d4','#ec4899'];

// The app started on this date — no scores or jobs are processed before this
const APP_START_DATE = parseLocal('2026-03-16');
const DEFAULT_MEMBERS = [
  {id:'m1',name:'Alex',color:'#f59e0b',iban:'',absences:[]},
  {id:'m2',name:'Lena',color:'#ef4444',iban:'',absences:[]},
  {id:'m3',name:'Tom', color:'#3b82f6',iban:'',absences:[]},
  {id:'m4',name:'Mia', color:'#10b981',iban:'',absences:[]},
];
const DEFAULT_JOBS = [
  {id:'j1',name:'🍳 Küche',frequency:'weekly', tasks:['Herd abwischen','Arbeitsflächen reinigen','Spüle putzen','Boden wischen']},
  {id:'j2',name:'🚿 Bad',  frequency:'weekly', tasks:['WC reinigen','Waschbecken putzen','Dusche schrubben','Spiegel wischen']},
  {id:'j3',name:'🚪 Flur', frequency:'weekly', tasks:['Saugen','Wischen','Eingang sauber halten']},
  {id:'j4',name:'🗑️ Müll', frequency:'weekly', tasks:['Restmüll','Biomüll','Papiermüll','Gelber Sack']},
];

/* ══ FIREBASE HOOK ══ */
function useFirebase(path, defaultValue) {
  const [value, setValue] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const initialized = useRef(false);
  useEffect(() => {
    const ref = db.ref(path);
    ref.on('value', snap => {
      const data = snap.val();
      if (data !== null) {
        const parsed = Array.isArray(defaultValue) && data && typeof data==='object' && !Array.isArray(data)
          ? Object.values(data) : data;
        setValue(parsed);
      } else if (!initialized.current) {
        ref.set(defaultValue); setValue(defaultValue);
      }
      initialized.current = true; setLoading(false);
    });
    return () => ref.off();
  }, [path]);
  const set = useCallback((updater) => {
    setValue(prev => {
      const newVal = typeof updater==='function' ? updater(prev) : updater;
      setSyncing(true);
      db.ref(path).set(newVal).finally(() => setSyncing(false));
      return newVal;
    });
  }, [path]);
  return [value ?? defaultValue, set, loading, syncing];
}

/* ══ JOB SCHEDULING ══ */
function getActiveJobs(jobs, memberCount, weekKey) {
  const slot = Math.floor((parseLocal(weekKey).getDate()-1)/7);
  const weekly = jobs.filter(j => (j.frequency||'weekly')==='weekly');
  const monthly = jobs.filter(j => j.frequency==='monthly').filter((_,i) => Math.floor(i/memberCount)===slot);
  return [...weekly, ...monthly];
}

// Assign jobs to PRESENT members, sorted by score desc then rotation order
function getAssignments(jobs, members, weekKey, scores) {
  if (!members.length || !jobs.length) return [];
  const activeJobs = getActiveJobs(jobs, members.length, weekKey);
  if (!activeJobs.length) return [];
  const sc = scores||{};
  const wn = weekNumber(weekKey);
  const n = members.length;
  const present = members.filter(m => !isMemberAway(m,weekKey));
  if (!present.length) return activeJobs.map(job => ({jobId:job.id,memberId:null}));
  const sorted = [...present].sort((a,b) => {
    const diff = (sc[b.id]||0)-(sc[a.id]||0);
    if (diff!==0) return diff;
    const ia = members.findIndex(m=>m.id===a.id);
    const ib = members.findIndex(m=>m.id===b.id);
    return ((ia-wn)%n+n)%n - ((ib-wn)%n+n)%n;
  });
  return activeJobs.map((job,i) => ({jobId:job.id, memberId:sorted[i%sorted.length].id}));
}

// How many jobs would this member get if everyone was present? (for score calculation)
function simulateNormalShare(jobs, members, weekKey, memberId) {
  if (!members.length || !jobs.length) return 0;
  const activeJobs = getActiveJobs(jobs, members.length, weekKey);
  if (!activeJobs.length) return 0;
  const wn = weekNumber(weekKey);
  const n = members.length;
  const sorted = [...members].sort((a,b) => {
    const ia = members.findIndex(m=>m.id===a.id);
    const ib = members.findIndex(m=>m.id===b.id);
    return ((ia-wn)%n+n)%n - ((ib-wn)%n+n)%n;
  });
  return activeJobs.filter((_,i) => sorted[i%sorted.length].id===memberId).length;
}

/* ══ SCORE PROCESSING ══
   Called once on app start. Processes all unprocessed Sundays.
   Rules:
   - Absent member: +N where N = jobs they would have gotten (simulation)
   - Present member who did extra jobs (beyond their normal share): -1 per extra job done
   - Present member who did only their normal share: no change
*/
function processScores(jobs, members, cleaningDone, scores, lastProcessed, setScores, setLastProcessed) {
  if (!members.length || !jobs.length) return;
  const lastSunday = getLastSunday();
  const lastProcessedDate = lastProcessed ? parseLocal(lastProcessed) : null;
  // Collect Sundays to process (oldest first), never before APP_START_DATE
  const toProcess = [];
  let cur = new Date(lastSunday);
  while (true) {
    if (lastProcessedDate && cur <= lastProcessedDate) break;
    // Never process weeks before the app started
    const weekMon = addDays(cur, -6);
    if (weekMon < APP_START_DATE) break;
    toProcess.unshift(new Date(cur));
    cur.setDate(cur.getDate()-7);
  }
  if (!toProcess.length) return;

  let newScores = {...(scores||{})};

  toProcess.forEach(sunday => {
    // Week that ended on this Sunday
    const weekKey = getWeekKey(addDays(sunday,-6));
    const done = (cleaningDone||{})[weekKey]||{};
    const activeJobs = getActiveJobs(jobs, members.length, weekKey);
    if (!activeJobs.length) return;
    const realAssignments = getAssignments(jobs, members, weekKey, newScores);

    members.forEach(member => {
      if (isMemberAway(member, weekKey)) {
        // How many jobs would they have gotten?
        const wouldHave = simulateNormalShare(jobs, members, weekKey, member.id);
        newScores[member.id] = (newScores[member.id]||0) + wouldHave;
      } else {
        // How many were assigned to them, and how many did they do?
        const myJobs = realAssignments.filter(a => a.memberId===member.id);
        const myDone = myJobs.filter(a => done[a.jobId]).length;
        // Their normal share (if everyone present)
        const normalShare = simulateNormalShare(jobs, members, weekKey, member.id);
        // Extra = assigned more than normal (because others absent), and actually done
        const extraDone = Math.max(0, myDone - normalShare);
        if (extraDone > 0) newScores[member.id] = (newScores[member.id]||0) - extraDone;
      }
    });
  });

  const d = lastSunday;
  const newLP = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  setScores(newScores);
  setLastProcessed(newLP);
}

/* ══ SHARED COMPONENTS ══ */

function ColorDropdown({value,takenColors,onChange}) {

/* ══ PIN SCREEN ══ */
function PinScreen({isSetup,existingPin,onUnlock}) {
  const [input,setInput]=useState('');
  const [confirmPin,setConfirmPin]=useState('');
  const [step,setStep]=useState('enter');
  const [error,setError]=useState('');
  const [shake,setShake]=useState(false);
  const PIN_LEN=4;
  function triggerError(msg){setError(msg);setShake(true);setTimeout(()=>{setShake(false);setInput('');},600);}
  function handleKey(k){
    if(k==='del'){setInput(p=>p.slice(0,-1));setError('');return;}
    const next=input+k;
    if(next.length>PIN_LEN)return;
    setInput(next);
    if(next.length===PIN_LEN){
      setTimeout(()=>{
        if(isSetup){
          if(step==='enter'){setConfirmPin(next);setInput('');setStep('confirm');}
          else if(next===confirmPin){onUnlock(next);}
          else{triggerError('PINs stimmen nicht überein');setStep('enter');setConfirmPin('');}
        } else {
          if(next===existingPin)onUnlock();
          else triggerError('Falscher PIN');
        }
      },100);
    }
  }
  const keys=['1','2','3','4','5','6','7','8','9','empty','0','del'];
  return <div className="pin-screen">
    <div className="pin-logo">🏠 WG Eifelwall</div>
    <div className="pin-subtitle">{isSetup?'PIN einrichten':'PIN eingeben'}</div>
    {isSetup&&<div className="pin-setup-hint">{step==='enter'?'4-stelligen PIN für die WG festlegen.':'PIN zur Bestätigung wiederholen.'}</div>}
    <div className="pin-dots">{Array.from({length:PIN_LEN}).map((_,i)=><div key={i} className={`pin-dot ${i<input.length?(shake?'error':'filled'):''}`}/>)}</div>
    <div className="pin-error-msg">{error}</div>
    <div className="pin-grid">{keys.map((k,i)=><div key={i} className={`pin-key ${k==='del'?'del':''} ${k==='empty'?'empty':''}`} onClick={()=>k!=='empty'&&handleKey(k)}>{k==='del'?'⌫':k==='empty'?'':k}</div>)}</div>
  </div>;
}

/* ══ PINNWAND ══ */
function Pinnwand({members,pins,setPins}) {
  const [text,setText]=useState('');
  const [author,setAuthor]=useState('');
  const [open,setOpen]=useState(false);
  useEffect(()=>{if(members.length&&!author)setAuthor(members[0].id);},[members]);
  function addPin(){
    if(!text.trim()||!author)return;
    setPins(prev=>[{id:uid(),text:text.trim(),authorId:author,createdAt:new Date().toISOString()},...(prev||[])]);
    setText('');setOpen(false);
  }
  function fmtTime(iso){
    const diff=Math.floor((Date.now()-new Date(iso))/60000);
    if(diff<1)return'gerade eben';if(diff<60)return`vor ${diff} Min`;
    if(diff<1440)return`vor ${Math.floor(diff/60)} Std`;
    return new Date(iso).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  }
  const sorted=[...(pins||[])].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return <div style={{marginTop:4}}>
    <div className="flex items-center justify-between" style={{marginBottom:10}}>
      <div style={{fontFamily:'Syne',fontWeight:700,fontSize:16}}>📌 Pinnwand</div>
      <button className="btn btn-ghost btn-xs" onClick={()=>setOpen(o=>!o)}>{open?'Abbrechen':'+ Notiz'}</button>
    </div>
    {open&&<div className="card" style={{marginBottom:10}}>
      <div className="form-group" style={{marginBottom:10}}>
        <label>Von wem?</label>
        <select value={author} onChange={e=>setAuthor(e.target.value)}>{members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
        <textarea rows={2} placeholder="Frage, Vorschlag, Idee …" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addPin();}}} style={{flex:1}}/>
        <button className="btn btn-primary btn-sm" onClick={addPin} style={{flexShrink:0}}>📌</button>
      </div>
    </div>}
    {sorted.length===0
      ?<div style={{textAlign:'center',padding:'24px 0',color:'var(--text3)',fontSize:13}}>Noch keine Notizen</div>
      :sorted.map(pin=>{
        const member=members.find(m=>m.id===pin.authorId);
        return <div key={pin.id} className="pin-card">
          {member&&<div className="pin-author" style={{color:member.color}}>{member.name}</div>}
          <div className="pin-text">{pin.text}</div>
          <div className="pin-time">{fmtTime(pin.createdAt)}</div>
          <button className="pin-del" onClick={()=>setPins(prev=>prev.filter(p=>p.id!==pin.id))}>✕</button>
        </div>;
      })
    }
  </div>;
}

/* ══ PUTZPLAN ══ */
function Putzplan({members,jobs,cleaningDone,setCleaningDone,scores}) {
  const [view,setView]=useState('woche');
  const [weekKey,setWeekKey]=useState(getWeekKey(new Date()));
  const currentWeekKey=getWeekKey(new Date());
  const isCurrentWeek=weekKey===currentWeekKey;
  const monday=parseLocal(weekKey), sunday=addDays(monday,6);
  const assignments=useMemo(()=>getAssignments(jobs,members,weekKey,scores),[jobs,members,weekKey,scores]);
  const weekDone=(cleaningDone||{})[weekKey]||{};
  const awayThisWeek=members.filter(m=>isMemberAway(m,weekKey));
  function toggle(jobId){setCleaningDone(prev=>({...prev,[weekKey]:{...(prev[weekKey]||{}),[jobId]:!(prev[weekKey]||{})[jobId]}}));}
  function navWeek(n){setWeekKey(getWeekKey(addDays(parseLocal(weekKey),n*7)));}
  function navMonth(n){const d=parseLocal(weekKey);d.setMonth(d.getMonth()+n);setWeekKey(getWeekKey(d));}
  const monthWeeks=useMemo(()=>{
    const d=parseLocal(weekKey),last=new Date(d.getFullYear(),d.getMonth()+1,0);
    const weeks=[];let cur=getMonday(new Date(d.getFullYear(),d.getMonth(),1));
    while(cur<=last){weeks.push(getWeekKey(cur));cur=addDays(cur,7);}
    return weeks;
  },[weekKey]);

  return <div>
    <div className="section-header">
      <h2 className="section-title">Putzplan</h2>
      {!isCurrentWeek&&<button className="btn btn-ghost btn-sm" onClick={()=>setWeekKey(currentWeekKey)}>Heute</button>}
    </div>
    <div className="tab-switch">
      <button className={`tab-switch-btn ${view==='woche'?'active':''}`} onClick={()=>setView('woche')}>Woche</button>
      <button className={`tab-switch-btn ${view==='monat'?'active':''}`} onClick={()=>setView('monat')}>Monat</button>
    </div>
    {view==='woche'?<>
      <div className="week-nav">
        <button className="icon-btn" onClick={()=>navWeek(-1)} style={{opacity:monday<APP_START_DATE?0.3:1,pointerEvents:monday<APP_START_DATE?'none':'auto'}}>←</button>
        <div style={{textAlign:'center'}}>
          <div className="week-label">{fmtShort(monday)} – {fmtShort(sunday)}</div>
          {isCurrentWeek&&<div style={{fontSize:10,color:'var(--accent)',marginTop:1}}>Diese Woche</div>}
        </div>
        <button className="icon-btn" onClick={()=>navWeek(1)}>→</button>
      </div>
      {monday<APP_START_DATE&&<div style={{textAlign:'center',padding:'40px 20px',color:'var(--text2)'}}>
        <div style={{fontSize:32,marginBottom:10}}>📅</div>
        <div style={{fontSize:14}}>Die App startete am {fmtShort(APP_START_DATE)}.</div>
        <div style={{fontSize:12,marginTop:4,color:'var(--text3)'}}>Für frühere Wochen gibt es keine Daten.</div>
      </div>}
      {monday>=APP_START_DATE&&awayThisWeek.length>0&&<div style={{marginBottom:12,padding:'8px 12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <span style={{fontSize:12,color:'var(--text2)'}}>✈️ Weg:</span>
        {awayThisWeek.map(m=><span key={m.id} style={{fontSize:12,color:m.color,fontWeight:500}}>{m.name}</span>)}
      </div>}
      {monday>=APP_START_DATE&&(jobs.length===0?<div className="empty"><div className="empty-icon">💼</div><div className="empty-text">Lege zuerst Jobs an.</div></div>
      :members.length===0?<div className="empty"><div className="empty-icon">👥</div><div className="empty-text">Füge Bewohner hinzu.</div></div>
      :<div className="card" style={{padding:0,overflow:'hidden'}}>
        {assignments.map((a,i)=>{
          const job=jobs.find(j=>j.id===a.jobId);
          const member=a.memberId?members.find(m=>m.id===a.memberId):null;
          const done=weekDone[a.jobId]||false;
          if(!job)return null;
          if(!member)return <div key={a.jobId} style={{padding:'15px 16px',borderBottom:i<assignments.length-1?'1px solid var(--border)':'none',fontSize:14,color:'var(--text2)'}}>{job.name} — <span style={{color:'var(--accent)'}}>niemand verfügbar</span></div>;
          const normalShare=simulateNormalShare(jobs,members,weekKey,member.id);
          const assignedCount=assignments.filter(x=>x.memberId===member.id).length;
          const isExtra=assignedCount>normalShare&&assignments.filter(x=>x.memberId===member.id).findIndex(x=>x.jobId===a.jobId)===assignedCount-1;
          const memberScore=(scores||{})[member.id]||0;
          return <div key={a.jobId} style={{display:'flex',alignItems:'center',gap:14,padding:'15px 16px',borderBottom:i<assignments.length-1?'1px solid var(--border)':'none',background:done?'rgba(34,197,94,0.05)':'transparent',transition:'background 0.2s'}}>
            <CheckBox checked={done} onChange={()=>toggle(a.jobId)} color={member.color}/>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:500,textDecoration:done?'line-through':'none',color:done?'var(--text2)':'var(--text)'}}>{job.name}</div>
              <div style={{display:'flex',gap:5,marginTop:2,flexWrap:'wrap'}}>
                {job.frequency==='monthly'&&<span style={{fontSize:11,color:'var(--accent)',fontWeight:500}}>monatlich</span>}
                {isExtra&&memberScore<=0&&<span style={{fontSize:11,color:'var(--success)'}}>⭐ Extra-Job</span>}
                {memberScore>0&&<span style={{fontSize:11,color:'var(--accent)'}}>↩️ Ausgleichs-Job</span>}
              </div>
            </div>
            <Avatar member={member} size={30}/>
          </div>;
        })}
      </div>)}
    </>:<>
      <div className="week-nav">
        <button className="icon-btn" onClick={()=>navMonth(-1)}>←</button>
        <div className="week-label">{fmtMonthYear(weekKey)}</div>
        <button className="icon-btn" onClick={()=>navMonth(1)}>→</button>
      </div>
      <div className="card" style={{padding:'4px 16px'}}>
        {monthWeeks.map(wk=>{
          const wkMon=parseLocal(wk),wkSun=addDays(wkMon,6);
          const wkAssign=getAssignments(jobs,members,wk,scores);
          const wkDone=(cleaningDone||{})[wk]||{};
          const dc=wkAssign.filter(a=>wkDone[a.jobId]).length;
          const isCur=wk===currentWeekKey;
          return <div key={wk} className="month-week">
            <div className="flex items-center justify-between" style={{marginBottom:7}}>
              <div style={{fontSize:13,fontWeight:600,color:isCur?'var(--accent)':'var(--text)',display:'flex',alignItems:'center',gap:6}}>
                {isCur&&<span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',display:'inline-block'}}/>}
                {fmtShort(wkMon)} – {fmtShort(wkSun)}
              </div>
              <div style={{fontSize:11,color:'var(--text2)'}}>{dc}/{wkAssign.length}</div>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {wkAssign.map(a=>{
                const job=jobs.find(j=>j.id===a.jobId),member=members.find(m=>m.id===a.memberId);
                if(!job||!member)return null;
                const done=wkDone[a.jobId];
                return <div key={a.jobId} style={{display:'flex',alignItems:'center',gap:5,background:done?'rgba(34,197,94,0.1)':'var(--bg3)',border:`1px solid ${done?'rgba(34,197,94,0.25)':'var(--border)'}`,borderRadius:7,padding:'4px 9px'}}>
                  <div style={{width:5,height:5,borderRadius:'50%',background:member.color,flexShrink:0}}/>
                  <span style={{fontSize:11,color:done?'var(--text2)':'var(--text)'}}>{job.name.replace(/^\S+\s*/,'')}</span>
                </div>;
              })}
              {wkAssign.length===0&&<span style={{fontSize:11,color:'var(--text3)'}}>Keine Jobs</span>}
            </div>
          </div>;
        })}
      </div>
    </>}
  </div>;
}

/* ══ WG-EINKÄUFE ══ */
function WGEinkaufe({members,purchases,setPurchases}) {
  const [showAdd,setShowAdd]=useState(false);

  const done=(purchases||[]).filter(p=>p.done);
  function add(){
    if(!desc.trim()||!amount||!paidBy)return;
    const val=parseFloat(amount.replace(',','.'));
    if(isNaN(val)||val<=0)return;
    setPurchases(prev=>[{id:uid(),description:desc.trim(),amount:val.toFixed(2),paidBy,done:false,createdAt:new Date().toISOString()},...(prev||[])]);
    setDesc('');setAmount('');setShowAdd(false);
  }
  function toggleDone(id){setPurchases(prev=>prev.map(p=>p.id===id?{...p,done:!p.done}:p));}

      </div>
      <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,color:isDone?'var(--text2)':'var(--accent)',flexShrink:0}}>{p.amount}€</div>

    </div>;
  };
  return <div>
    <div className="section-header">

      {open.length>0&&<div className="card" style={{padding:0,overflow:'hidden',marginBottom:14}}>
        <div className="purchase-section-label">Offen — {open.length}</div>
        {open.map((p,i)=><div key={p.id} style={{borderBottom:i<open.length-1?'1px solid var(--border)':'none'}}><PRow p={p} isDone={false}/></div>)}
      </div>}
      {done.length>0&&<div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="purchase-section-label">Überwiesen — {done.length}</div>
        {done.map((p,i)=><div key={p.id} style={{borderBottom:i<done.length-1?'1px solid var(--border)':'none'}}><PRow p={p} isDone={true}/></div>)}
      </div>}
    </>}
    {showAdd&&<Modal title="💸 Neuer Eintrag" onClose={()=>setShowAdd(false)}>
      <div className="form-group"><label>Beschreibung</label><input autoFocus placeholder="z.B. Toilettenpapier …" value={desc} onChange={e=>setDesc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/></div>
      <div className="form-group"><label>Betrag (€)</label><input type="number" step="0.01" min="0.01" placeholder="0,00" value={amount} onChange={e=>setAmount(e.target.value)}/></div>
      <div className="form-group"><label>Wer hat bezahlt?</label><select value={paidBy} onChange={e=>setPaidBy(e.target.value)}>{members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
      <div className="flex gap-2 mt-3">
        <button className="btn btn-ghost flex-1" onClick={()=>setShowAdd(false)}>Abbrechen</button>
        <button className="btn btn-primary flex-1" onClick={add}>Eintragen</button>
      </div>
    </Modal>}
  </div>;
}

/* ══ BEWOHNER ══ */
function Bewohner({members,setMembers,scores,setScores}) {
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState('');
  const [newColor,setNewColor]=useState(COLORS[0]);
  const [absModalFor,setAbsModalFor]=useState(null);
  const [absFrom,setAbsFrom]=useState('');
  const [absTo,setAbsTo]=useState('');
  function add(){
    if(!newName.trim())return;
    const used=members.map(m=>m.color);
    const color=COLORS.find(c=>!used.includes(c))||newColor;
    setMembers(prev=>[...prev,{id:uid(),name:newName.trim(),color,iban:'',absences:[]}]);
    setNewName('');setShowAdd(false);
  }
  function remove(id){
    if(confirm('Bewohner wirklich entfernen?')){
      setMembers(prev=>prev.filter(m=>m.id!==id));
      setScores(prev=>{const s={...prev};delete s[id];return s;});
    }
  }
  function update(id,changes){setMembers(prev=>prev.map(m=>m.id===id?{...m,...changes}:m));}
  function addAbsence(memberId){
    if(!absFrom||!absTo||absFrom>absTo)return;
    setMembers(prev=>prev.map(m=>m.id===memberId?{...m,absences:[...(m.absences||[]),{id:uid(),from:absFrom,to:absTo}]}:m));
    setAbsFrom('');setAbsTo('');setAbsModalFor(null);
  }
  function removeAbsence(memberId,absId){setMembers(prev=>prev.map(m=>m.id===memberId?{...m,absences:m.absences.filter(a=>a.id!==absId)}:m));}
  function adjustScore(memberId,delta){setScores(prev=>({...prev,[memberId]:(prev[memberId]||0)+delta}));}
  return <div>
    <div className="section-header">
      <h2 className="section-title">Bewohner</h2>
      <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Einziehen</button>
    </div>
    {members.length===0&&<div className="empty"><div className="empty-icon">👥</div><div className="empty-text">Noch keine Bewohner</div></div>}
    {members.map(member=>{
      const score=(scores||{})[member.id]||0;
      return <div key={member.id} className="card">
        <div className="flex items-center gap-2" style={{marginBottom:14}}>
          <Avatar member={member} size={48}/>
          <div style={{flex:1,minWidth:0}}>
            <input value={member.name} onChange={e=>update(member.id,{name:e.target.value})}
              style={{background:'transparent',border:'none',padding:0,fontSize:17,fontWeight:600,fontFamily:'Syne',color:'var(--text)',borderBottom:'1px solid transparent',borderRadius:0,width:'100%'}}
              onFocus={e=>e.target.style.borderBottomColor='var(--accent)'}
              onBlur={e=>e.target.style.borderBottomColor='transparent'}/>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
              Bewohner
              <ScoreBadge score={score} onAdjust={()=>adjustScore(member.id,score>0?-1:1)}/>
            </div>
          </div>
          <button onClick={()=>remove(member.id)} style={{background:'none',border:'1px solid var(--danger)',borderRadius:7,cursor:'pointer',color:'var(--danger)',fontSize:12,padding:'5px 10px',fontFamily:'DM Sans',flexShrink:0}}>Ausziehen</button>
        </div>
        <div style={{marginBottom:14}}>
          <label>Farbe</label>
          <ColorDropdown value={member.color} takenColors={members.filter(m=>m.id!==member.id).map(m=>m.color)} onChange={c=>update(member.id,{color:c})}/>
        </div>
        <div className="form-group">
          <label>IBAN (optional)</label>
          <input placeholder="DE00 0000 0000 0000 0000 00" value={member.iban||''} onChange={e=>update(member.id,{iban:e.target.value})}/>
        </div>
        <div>
          <div className="flex items-center justify-between" style={{marginBottom:8}}>
            <label style={{margin:0}}>Abwesenheiten</label>
            <button className="btn btn-ghost btn-xs" onClick={()=>{setAbsModalFor(member.id);setAbsFrom('');setAbsTo('');}}>✈️ Urlaub eintragen</button>
          </div>
          <div>
            {!(member.absences?.length)?<span style={{fontSize:12,color:'var(--text3)'}}>Keine Abwesenheiten</span>
            :member.absences.map(abs=><div key={abs.id} className="absence-tag">
              ✈️ {fmtShort(abs.from)} – {fmtShort(abs.to)}
              <span className="tag-del" onClick={()=>removeAbsence(member.id,abs.id)}>✕</span>
            </div>)}
          </div>
        </div>
      </div>;
    })}
    {showAdd&&<Modal title="🏠 Einziehen" onClose={()=>setShowAdd(false)}>
      <div className="form-group"><label>Name</label><input autoFocus placeholder="Name" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/></div>
      <div className="form-group"><label>Farbe</label><ColorDropdown value={newColor} takenColors={members.map(m=>m.color)} onChange={setNewColor}/></div>
      <div className="flex gap-2 mt-3">
        <button className="btn btn-ghost flex-1" onClick={()=>setShowAdd(false)}>Abbrechen</button>
        <button className="btn btn-primary flex-1" onClick={add}>Einziehen</button>
      </div>
    </Modal>}
    {absModalFor&&<Modal title="✈️ Urlaub eintragen" onClose={()=>setAbsModalFor(null)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div className="form-group" style={{margin:0}}><label>Von</label><input type="date" value={absFrom} onChange={e=>setAbsFrom(e.target.value)}/></div>
        <div className="form-group" style={{margin:0}}><label>Bis</label><input type="date" value={absTo} onChange={e=>setAbsTo(e.target.value)} min={absFrom}/></div>
      </div>
      <div className="flex gap-2">
        <button className="btn btn-ghost flex-1" onClick={()=>setAbsModalFor(null)}>Abbrechen</button>
        <button className="btn btn-primary flex-1" onClick={()=>addAbsence(absModalFor)}>Speichern</button>
      </div>
    </Modal>}
  </div>;
}

/* ══ JOBS ══ */
function Jobs({jobs,setJobs}) {
  const [expanded,setExpanded]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState('');
  const [newFreq,setNewFreq]=useState('weekly');
  const [newTask,setNewTask]=useState({});
  function add(){
    if(!newName.trim())return;
    const id=uid();
    setJobs(prev=>[...prev,{id,name:newName.trim(),frequency:newFreq,tasks:[]}]);
    setExpanded(id);setNewName('');setNewFreq('weekly');setShowAdd(false);
  }
  function del(id){if(confirm('Job wirklich löschen?')){setJobs(prev=>prev.filter(j=>j.id!==id));if(expanded===id)setExpanded(null);}}
  function update(id,changes){setJobs(prev=>prev.map(j=>j.id===id?{...j,...changes}:j));}
  function addTask(jobId){
    const t=(newTask[jobId]||'').trim();if(!t)return;
    setJobs(prev=>prev.map(j=>j.id===jobId?{...j,tasks:[...(j.tasks||[]),t]}:j));
    setNewTask(prev=>({...prev,[jobId]:''}));
  }
  function removeTask(jobId,i){setJobs(prev=>prev.map(j=>j.id===jobId?{...j,tasks:j.tasks.filter((_,idx)=>idx!==i)}:j));}
  return <div>
    <div className="section-header">
      <h2 className="section-title">Jobs</h2>
      <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Job</button>
    </div>
    <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Was zu jedem Putzjob gehört — von allen bearbeitbar.</div>
    {!jobs.length?<div className="empty">
      <div className="empty-icon">💼</div><div className="empty-text">Noch keine Jobs</div>
      <button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setShowAdd(true)}>Ersten Job erstellen</button>
    </div>:jobs.map(job=>{
      const isOpen=expanded===job.id;
      return <div key={job.id} className="job-card">
        <div className="job-card-header" onClick={()=>setExpanded(isOpen?null:job.id)}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:600}} className="truncate">{job.name}</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{(job.tasks||[]).length} Aufgabe{(job.tasks||[]).length!==1?'n':''} · {job.frequency==='monthly'?'🗓️ monatlich':'📅 wöchentlich'}</div>
          </div>
          <button onClick={e=>{e.stopPropagation();del(job.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:16,padding:'4px',marginRight:4}}>🗑️</button>
          <span style={{color:'var(--text2)',fontSize:12}}>{isOpen?'▲':'▼'}</span>
        </div>
        {isOpen&&<div className="job-card-body">
          <div className="form-group"><label>Name</label><input value={job.name} onChange={e=>update(job.id,{name:e.target.value})} placeholder="z.B. 🍳 Küche"/></div>
          <div className="form-group">
            <label>Häufigkeit</label>
            <div className="tab-switch" style={{marginBottom:0}}>
              <button className={`tab-switch-btn ${(job.frequency||'weekly')==='weekly'?'active':''}`} onClick={()=>update(job.id,{frequency:'weekly'})}>📅 Wöchentlich</button>
              <button className={`tab-switch-btn ${job.frequency==='monthly'?'active':''}`} onClick={()=>update(job.id,{frequency:'monthly'})}>🗓️ Monatlich</button>
            </div>
          </div>
          <div>
            <label>Aufgaben</label>
            {(job.tasks||[]).map((task,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{color:'var(--accent)',fontSize:16}}>·</span>
              <span style={{flex:1,fontSize:13}}>{task}</span>
              <button onClick={()=>removeTask(job.id,i)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:14,padding:'2px 4px'}}>✕</button>
            </div>)}
            <div className="flex gap-2" style={{marginTop:8}}>
              <input placeholder="Aufgabe hinzufügen …" value={newTask[job.id]||''} onChange={e=>setNewTask(prev=>({...prev,[job.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addTask(job.id)} style={{flex:1}}/>
              <button className="btn btn-ghost btn-sm" onClick={()=>addTask(job.id)}>+</button>
            </div>
          </div>
        </div>}
      </div>;
    })}
    {showAdd&&<Modal title="💼 Neuer Job" onClose={()=>setShowAdd(false)}>
      <div className="form-group"><label>Name</label><input autoFocus placeholder="z.B. 🍳 Küche" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/></div>
      <div className="form-group">
        <label>Häufigkeit</label>
        <div className="tab-switch" style={{marginBottom:0}}>
          <button className={`tab-switch-btn ${newFreq==='weekly'?'active':''}`} onClick={()=>setNewFreq('weekly')}>📅 Wöchentlich</button>
          <button className={`tab-switch-btn ${newFreq==='monthly'?'active':''}`} onClick={()=>setNewFreq('monthly')}>🗓️ Monatlich</button>
        </div>
      </div>
      <div className="flex gap-2 mt-3">
        <button className="btn btn-ghost flex-1" onClick={()=>setShowAdd(false)}>Abbrechen</button>
        <button className="btn btn-primary flex-1" onClick={add}>Erstellen</button>
      </div>
    </Modal>}
  </div>;
}

/* ══ APP ROOT ══ */
function App() {
  const [tab,setRawTab]=useState('dashboard');
  const [unlocked,setUnlocked]=useState(false);
  function setTab(t){setRawTab(t);setTimeout(()=>document.querySelector('.content')?.scrollTo(0,0),0);}

  const [members,     setMembers,     loadingM, syncingM] = useFirebase('members',       DEFAULT_MEMBERS);
  const [jobs,        setJobs,        loadingJ, syncingJ] = useFirebase('jobs',          DEFAULT_JOBS);
  const [cleaningDone,setCleaningDone,loadingC]           = useFirebase('cleaningDone',  {});
  const [purchases,   setPurchases,   loadingP]           = useFirebase('purchases',     []);
  const [pins,        setPins,        loadingPi]          = useFirebase('pins',          []);
  const [appPin,      setAppPin,      loadingPin]         = useFirebase('appPin',        'unset');
  const [scores,      setScores,      loadingS]           = useFirebase('scores',        {});
  const [lastProcessed,setLastProcessed,loadingLP]        = useFirebase('lastProcessed', null);

  const loading = loadingM||loadingJ||loadingC||loadingP||loadingPi||loadingPin||loadingS||loadingLP;
  const syncing = syncingM||syncingJ;

  // Process scores once on startup when all data is loaded
  const processedRef = useRef(false);
  useEffect(() => {
    if (loading || processedRef.current) return;
    if (!members.length || !jobs.length) return;
    processedRef.current = true;
    processScores(jobs, members, cleaningDone, scores, lastProcessed, setScores, setLastProcessed);
  }, [loading]);

  const tabs = [
    {id:'dashboard',icon:'🏠',label:'Home'},
    {id:'putzplan', icon:'🧹',label:'Putzplan'},
    {id:'einkaufe', icon:'💸',label:'Einkäufe'},
    {id:'bewohner', icon:'👥',label:'Bewohner'},
    {id:'jobs',     icon:'💼',label:'Jobs'},
  ];

  const todayWeekKey = getWeekKey(new Date());
  const todayAssignments = getAssignments(jobs, members, todayWeekKey, scores);
  const todayDone = (cleaningDone||{})[todayWeekKey]||{};
  const pendingJobs = todayAssignments.filter(a=>!todayDone[a.jobId]).length;
  const openPurchases = (purchases||[]).filter(p=>!p.done).length;

  if (loading) return <div className="loading-screen"><div className="loading-spinner"/><div style={{fontSize:13,color:'var(--text2)'}}>WG wird geladen …</div></div>;

  if (!unlocked) {
    if (appPin==='unset') return <PinScreen isSetup={true} onUnlock={pin=>{setAppPin(pin);setUnlocked(true);}}/>;
    return <PinScreen isSetup={false} existingPin={appPin} onUnlock={()=>setUnlocked(true)}/>;
  }

  const today = new Date().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'short'});

  return <>
    <div className="app-header">
      <div className="app-logo">🏠 WG Eifelwall</div>
      <div className="flex items-center gap-2">
        <div className={`sync-dot ${syncing?'syncing':''}`} title={syncing?'Speichert …':'Gespeichert'}/>
        <div className="app-date">{today}</div>
      </div>
    </div>
    <div className="content">
      {tab==='dashboard'&&<Dashboard members={members} jobs={jobs} cleaningDone={cleaningDone} purchases={purchases} pins={pins} setPins={setPins} scores={scores} setActiveTab={setTab}/>}
      {tab==='putzplan' &&<Putzplan  members={members} jobs={jobs} cleaningDone={cleaningDone} setCleaningDone={setCleaningDone} scores={scores}/>}
      {tab==='einkaufe' &&<WGEinkaufe members={members} purchases={purchases} setPurchases={setPurchases}/>}
      {tab==='bewohner' &&<Bewohner  members={members} setMembers={setMembers} scores={scores} setScores={setScores}/>}
      {tab==='jobs'     &&<Jobs      jobs={jobs} setJobs={setJobs}/>}
    </div>
    <div className="bottom-nav">
      {tabs.map(t=><button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
        <div style={{position:'relative',display:'inline-flex'}}>
          <span className="nav-icon">{t.icon}</span>
          {t.id==='einkaufe'&&openPurchases>0&&<div style={{position:'absolute',top:-4,right:-6,background:'var(--accent)',borderRadius:'50%',width:14,height:14,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',color:'#000'}}>{openPurchases>9?'9+':openPurchases}</div>}
          {t.id==='putzplan'&&pendingJobs>0&&<div style={{position:'absolute',top:-4,right:-6,background:'var(--danger)',borderRadius:'50%',width:14,height:14,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{pendingJobs>9?'9+':pendingJobs}</div>}
        </div>
        <span className="nav-label">{t.label}</span>
      </button>)}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
